<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shree Ramesh Construction Material</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0b1423;
color:white;
}

/* HEADER */
header{
background:#111c2e;
padding:15px 6%;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 4px 15px rgba(0,0,0,0.6);
}

.logo{
font-size:22px;
font-weight:bold;
color:#25D366;
}

/* HERO */
.hero{
background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
url("https://images.unsplash.com/photo-1581091012184-49dd9f81f0ee?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&q=80&w=1080");
background-size:cover;
background-position:center;
height:85vh;
display:flex;
flex-direction:column;
justify-content:center;
padding:0 8%;
}

.hero h1 span{
color:#25D366;
}

/* MATERIAL SECTION */
.materials{
padding:80px 8%;
text-align:center;
background:#0f1b2d;
}

.materials h2{
font-size:32px;
margin-bottom:60px;
color:#25D366;
}

.material-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:50px;
}

/* 3D BOX */
.material-item{
padding:40px;
border-radius:18px;
background:#131f33;
box-shadow:0 10px 20px rgba(0,0,0,0.5);
transition:0.4s;
position:relative;
cursor:pointer;
}

/* HOVER LIFT */
.material-item:hover{
transform:translateY(-8px);
}

/* TAP / CLICK GLOW EFFECT */
.material-item:active{
transform:translateY(4px);
box-shadow:0 15px 35px rgba(37,211,102,0.8),
0 0 25px rgba(37,211,102,0.7);
}

/* BOTTOM GLOW LINE */
.material-item::after{
content:"";
position:absolute;
left:10%;
bottom:-10px;
width:80%;
height:10px;
background:rgba(37,211,102,0.6);
filter:blur(15px);
opacity:0;
transition:0.4s;
border-radius:50%;
}

.material-item:active::after{
opacity:1;
}

.material-name{
font-size:30px;
font-weight:bold;
}

.material-price{
margin-top:12px;
font-size:22px;
color:#25D366;
font-weight:bold;
}

/* RESPONSIVE */
@media(max-width:768px){
.material-grid{
grid-template-columns:repeat(2,1fr);
}
}

@media(max-width:480px){
.material-grid{
grid-template-columns:1fr;
}
}

footer{
background:#0b1423;
text-align:center;
padding:20px;
color:#aaa;
}
</style>
</head>

<body>

<header>
<div class="logo">Shree Ramesh Construction Material</div>
</header>

<section class="hero">
<h1>Shree Ramesh <span>Construction Material</span></h1>
</section>

<section class="materials">
<h2>Available Materials</h2>

<div class="material-grid">

<div class="material-item">
<div class="material-name">सीमेंट</div>
<div class="material-price">₹380 / Bag</div>
</div>

<div class="material-item">
<div class="material-name">सरिया</div>
<div class="material-price">₹60 / Kg</div>
</div>

<div class="material-item">
<div class="material-name">बालू</div>
<div class="material-price">₹55 / CFT</div>
</div>

<div class="material-item">
<div class="material-name">गिट्टी</div>
<div class="material-price">₹65 / CFT</div>
</div>

</div>
</section>

<footer>
© 2026 Shree Ramesh Construction Material
</footer>

</body>
</html>
