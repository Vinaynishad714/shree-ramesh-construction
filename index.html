<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shree Ramesh Construction Material</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f7fa;
}

/* HEADER */
header{
background:#0f2747;
color:white;
padding:15px 6%;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.logo{
font-size:22px;
font-weight:bold;
color:#ff7a00;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
font-size:14px;
}

/* HERO */
.hero{
background:#0f2747;
color:white;
padding:80px 8%;
text-align:center;
}

.hero h1{
font-size:40px;
margin:0;
}

.hero span{
color:#ff7a00;
}

.hero p{
font-size:18px;
margin-top:15px;
}

.btn{
background:#ff7a00;
color:white;
padding:12px 28px;
border:none;
margin-top:20px;
cursor:pointer;
text-decoration:none;
display:inline-block;
font-weight:bold;
}

/* FEATURE ICON SECTION */
.features{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:50px;
padding:60px 8%;
background:white;
text-align:center;
}

.feature-box{
width:180px;
}

.feature-box i{
font-size:50px;
color:#0f2747;
margin-bottom:15px;
transition:0.3s;
}

.feature-box i:hover{
color:#ff7a00;
transform:scale(1.2);
}

.feature-box h3{
font-size:18px;
margin:0;
color:#333;
}

/* FOOTER */
footer{
background:#081a30;
color:white;
text-align:center;
padding:20px;
font-size:14px;
}
</style>
</head>

<body>

<header>
<div class="logo">Shree Ramesh Construction Material</div>
<nav>
<a href="#">Home</a>
<a href="#">Contact</a>
</nav>
</header>

<section class="hero">
<h1>Shree Ramesh <span>Construction Material</span></h1>
<p>Premium Quality Construction Materials in Gorakhpur</p>
<a href="tel:9792246824" class="btn">Call Now</a>
</section>

<!-- SIMPLE ICON FEATURES -->
<section class="features">

<div class="feature-box">
<i class="fas fa-award"></i>
<h3>15+ Years Experience</h3>
</div>

<div class="feature-box">
<i class="fas fa-shield-halved"></i>
<h3>Trusted Seller</h3>
</div>

<div class="feature-box">
<i class="fas fa-check-circle"></i>
<h3>Quality Checked</h3>
</div>

<div class="feature-box">
<i class="fas fa-truck-fast"></i>
<h3>Fast Delivery</h3>
</div>

</section>

<footer>
© 2026 Shree Ramesh Construction Material | All Rights Reserved
</footer>

</body>
</html>
